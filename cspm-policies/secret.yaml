policies:
  # 만료일이 없어 영구적으로 유효한 시크릿
  - name: secret-without-expiry
    resource: openstack.secret
    description: Detect secrets that do not have an expiration date.
    filters:
      - type: value
        key: expires_at
        value: absent

  # 만료일까지 30일 이하로 남은 시크릿
  - name: secret-expiring-within-30-days
    resource: openstack.secret
    description: Detect secrets that expire within 30 days.
    filters:
      - type: value
        key: expires_at
        value_type: expiration
        op: ge
        value: 0
      - type: value
        key: expires_at
        value_type: expiration
        op: le
        value: 30

  # 취약한 암호화 알고리즘(MD5, DES, 3DES, RC4)을 사용하는 시크릿 탐지
  - name: secret-using-weak-algorithm
    resource: openstack.secret
    description: Detect secrets that use MD5, DES, 3DES, or RC4.
    filters:
      - type: value
        key: algorithm
        value_type: normalize
        op: in
        value:
          - md5
          - des
          - 3des
          - rc4

  # AES를 사용하지만 키 길이가 256비트 미만인 시크릿
  - name: secret-with-weak-aes-key-length
    resource: openstack.secret
    description: Detect AES secrets whose key length is less than 256 bits.
    filters:
      - type: value
        key: algorithm
        value_type: normalize
        value: aes
      - type: value
        key: bit_length
        op: lt
        value: 256

  # 30일 이내에 만료되는 인증서 타입 시크릿
  - name: certificate-secret-expiring-within-30-days
    resource: openstack.secret
    description: Detect certificate secrets that expire within 30 days.
    filters:
      - type: value
        key: secret_type
        value: certificate
      - type: value
        key: expires_at
        value_type: expiration
        op: ge
        value: 0
      - type: value
        key: expires_at
        value_type: expiration
        op: le
        value: 30
