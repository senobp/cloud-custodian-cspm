policies:

  # 1. 과도하게 큰 사양 Flavor 탐지 (vcpus 기준)
  #    vcpus 16개 이상인 flavor → 대형 인스턴스 무분별 사용 점검
  - name: detect-oversized-flavor-vcpus
    description: |
      vCPU가 16개 이상인 대형 flavor를 탐지한다.
      과도한 사양의 flavor가 무분별하게 사용되면
      클라우드 자원 낭비 및 비용 초과로 이어질 수 있다.
    resource: openstack.flavor
    filters:
      - type: value
        key: vcpus
        op: ge
        value: 16

  # 2. 과도하게 큰 사양 Flavor 탐지 (ram 기준)
  #    ram 32768MB(32GB) 이상인 flavor → 대형 메모리 인스턴스 점검
  #    ※ ram 필드는 MB 단위 → 32GB = 32768
  - name: detect-oversized-flavor-ram
    description: |
      메모리가 32GB(32768MB) 이상인 대형 flavor를 탐지한다.
      ram 필드는 MB 단위이므로 32GB = 32768 으로 비교한다.
      과도한 메모리 사양의 flavor 사용 현황을 파악하고
      불필요한 자원 할당을 방지하기 위해 점검한다.
    resource: openstack.flavor
    filters:
      - type: value
        key: ram
        op: ge
        value: 32768

  # 3. Public Flavor 탐지
  #    is_public == true 인 flavor → 모든 사용자가 사용 가능한 공개 사양 점검
  - name: detect-public-flavors
    description: |
      is_public=true 로 설정된 공개 flavor를 탐지한다.
      퍼블릭 flavor는 모든 프로젝트·사용자가 자유롭게 사용할 수 있어
      의도치 않은 대형 인스턴스 생성 등 자원 남용이 발생할 수 있다.
    resource: openstack.flavor
    filters:
      - type: value
        key: is_public
        value: true
